name: Deploy to Bare Metal Servers

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-baremetal-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PROXY_IMAGE_NAME: ${{ github.repository_owner }}/fly-redis-proxy-offchain

jobs:
  build_check:
    uses: ./.github/workflows/build-check.yml
    with:
      publish-artifact: true
    secrets: inherit

  build-and-push:
    name: Build and Push Docker Images
    needs: build_check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-glibc

      - name: Make binary executable
        run: chmod +x target/x86_64-unknown-linux-gnu/release/icp-off-chain-agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for offchain-agent
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Extract metadata for fly-redis-proxy
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.PROXY_IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build and push offchain-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy-baremetal/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push fly-redis-proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./deploy-baremetal/fly-redis-proxy
          file: ./deploy-baremetal/fly-redis-proxy/Dockerfile
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fetch-redis-passwords:
    name: Fetch Fly Redis Passwords
    needs: build_check
    runs-on: ubuntu-latest

    outputs:
      ml_feed_password: ${{ steps.redis.outputs.ml_feed_password }}

    steps:
      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fetch Redis passwords from Fly
        id: redis
        env:
          FLY_API_TOKEN: ${{ secrets.OFFCHAIN_FLY_API_TOKEN }}
        run: |
          # Function to fetch and extract password
          fetch_redis_password() {
            local db_name=$1
            local output_name=$2

            OUTPUT=$(flyctl redis status "$db_name" 2>&1)
            REDIS_URL=$(echo "$OUTPUT" | grep "Private URL" | awk '{print $NF}')
            REDIS_PASSWORD=$(echo "$REDIS_URL" | sed -n 's|redis://default:\([^@]*\)@.*|\1|p')

            if [ -n "$REDIS_PASSWORD" ]; then
              echo "::add-mask::$REDIS_PASSWORD"
              echo "::add-mask::$REDIS_URL"
            fi

            if [ -z "$REDIS_URL" ]; then
              echo "Error: Could not fetch Redis URL for $db_name"
              exit 1
            fi
            if [ -z "$REDIS_PASSWORD" ]; then
              echo "Error: Could not extract Redis password for $db_name"
              exit 1
            fi

            echo "${output_name}=$REDIS_PASSWORD" >> $GITHUB_OUTPUT
            echo "Password for $db_name fetched successfully"
          }

          # Fetch password
          fetch_redis_password "yral-ml-feed-cache" "ml_feed_password"

  prepare-servers:
    name: Prepare Server List
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.parse.outputs.servers }}
    steps:
      - name: Parse server IPs
        id: parse
        run: |
          # Convert comma-separated IPs to JSON array
          IPS="${{ vars.BAREMETAL_SERVER_IPS }}"
          JSON=$(echo "$IPS" | tr ',' '\n' | jq -R . | jq -s -c .)
          echo "servers=$JSON" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Server
    needs: [build-and-push, fetch-redis-passwords, prepare-servers]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.prepare-servers.outputs.servers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ matrix.server }} >> ~/.ssh/known_hosts

      - name: Check server connectivity
        run: |
          ssh -o ConnectTimeout=10 root@${{ matrix.server }} "echo 'Server ${{ matrix.server }} connection successful'"

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: off-chain-agent-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/off-chain-agent/HOT_OR_NOT_OFF_CHAIN_AGENT_CLOUDFLARE_R2_ACCESS_KEY_ID value | CF_R2_ACCESS_KEY_TEMP ;
            secret/data/off-chain-agent/HOT_OR_NOT_OFF_CHAIN_AGENT_CLOUDFLARE_R2_SECRET_ACCESS_KEY value | CF_R2_SECRET_ACCESS_KEY_TEMP ;
            secret/data/off-chain-agent/CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY value | CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY ;
            secret/data/off-chain-agent/YRAL_DAPP_BACKEND_APP_ADMIN_AND_PROPOSAL_SUBMITTER_IDENTITY_PRIVATE_KEY value | BACKEND_ADMIN_IDENTITY ;
            secret/data/off-chain-agent/YRAL_OFF_CHAIN_AGENT_GOOGLE_CLOUD_SERVICE_ACCOUNT_JSON_KEY value | GOOGLE_SA_KEY ;
            secret/data/off-chain-agent/OFF_CHAIN_AGENT_GRPC_AUTH_TOKEN value | GRPC_AUTH_TOKEN ;
            secret/data/off-chain-agent/YRAL_CLOUDFLARE_WORKERS_TO_OFFCHAIN_AGENT_GRPC_AUTH_TOKEN value | YRAL_CLOUDFLARE_WORKER_GRPC_AUTH_TOKEN ;
            secret/data/off-chain-agent/YRAL_AUTH_METADATA_SERVICE_ACCESS_JWT_TOKEN_FOR_OFFCHAIN_AGENT value | YRAL_METADATA_TOKEN ;
            secret/data/off-chain-agent/UPSTASH_VECTOR_READ_WRITE_TOKEN value | UPSTASH_VECTOR_READ_WRITE_TOKEN ;
            secret/data/off-chain-agent/ML_SERVER_JWT_TOKEN value | ML_SERVER_JWT_TOKEN ;
            secret/data/off-chain-agent/CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN value | CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN ;
            secret/data/off-chain-agent/QSTASH_CURRENT_SIGNING_KEY value | QSTASH_CURRENT_SIGNING_KEY ;
            secret/data/off-chain-agent/CLOUDFLARE_IMAGES_READ_AND_WRITE_API_TOKEN value | CF_IMAGES_API_TOKEN ;
            secret/data/off-chain-agent/TOKEN_TO_SIGN_OUTGOING_CALLS_TO_NSFW_DETECT_SERVICE value | NSFW_GRPC_TOKEN ;
            secret/data/off-chain-agent/QSTASH_TOKEN value | QSTASH_AUTH_TOKEN ;
            secret/data/off-chain-agent/STORJ_INTERFACE_TOKEN value | STORJ_INTERFACE_TOKEN ;
            secret/data/off-chain-agent/VIDEOHASH_BACKFILL_TOKEN value | VIDEOHASH_BACKFILL_TOKEN ;
            secret/data/off-chain-agent/STORJ_BACKUP_CANISTER_ACCESS_GRANT value | STORJ_BACKUP_CANISTER_ACCESS_GRANT ;
            secret/data/off-chain-agent/CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL value | CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL ;
            secret/data/off-chain-agent/ALLOYDB_SERVICE_ACCOUNT_JSON_PROD value | ALLOYDB_SERVICE_ACCOUNT_JSON ;
            secret/data/off-chain-agent/ALLOYDB_INSTANCE_PROD value | ALLOYDB_INSTANCE ;
            secret/data/off-chain-agent/ALLOYDB_DB_PASSWORD_PROD value | ALLOYDB_DB_PASSWORD ;
            secret/data/off-chain-agent/CANISTER_BACKUP_CACHE_REDIS_URL value | CANISTER_BACKUP_CACHE_REDIS_URL ;
            secret/data/off-chain-agent/YRAL_METADATA_NOTIFICATION_API_KEY value | YRAL_METADATA_NOTIFICATION_API_KEY ;
            secret/data/off-chain-agent/ML_FEED_CACHE_MEMORYSTORE_URL value | ML_FEED_CACHE_MEMORYSTORE_URL ;
            secret/data/off-chain-agent/VIDEOGEN_PROVIDER_LUMALABS_API_KEY value | LUMALABS_API_KEY ;
            secret/data/off-chain-agent/YRAL_HON_WORKER_JWT value | YRAL_HON_WORKER_JWT ;
            secret/data/off-chain-agent/LEADERBOARD_REDIS_URL value | LEADERBOARD_REDIS_URL ;
            secret/data/off-chain-agent/SERVICE_CANISTER_MIGRATION_REDIS_URL value | SERVICE_CANISTER_MIGRATION_REDIS_URL ;
            secret/data/off-chain-agent/HETZNER_S3_ACCESS_KEY value | HETZNER_S3_ACCESS_KEY ;
            secret/data/off-chain-agent/HETZNER_S3_SECRET_KEY value | HETZNER_S3_SECRET_KEY ;
            secret/data/off-chain-agent/AI_VIDEO_DETECTOR_API_KEY value | AI_VIDEO_DETECTOR_API_KEY ;
            secret/data/off-chain-agent/REPLICATE_API_TOKEN value | REPLICATE_API_TOKEN ;
            secret/data/off-chain-agent/COMFYUI_API_URL value | COMFYUI_API_URL ;
            secret/data/off-chain-agent/COMFYUI_VIEW_URL value | COMFYUI_VIEW_URL ;
            secret/data/off-chain-agent/COMFYUI_API_TOKEN value | COMFYUI_API_TOKEN ;
            secret/data/off-chain-agent/BTC_REWARDS_GCHAT_WEBHOOK_URL value | BTC_REWARDS_GCHAT_WEBHOOK_URL ;
            secret/data/off-chain-agent/YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY value | YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY ;
            secret/data/off-chain-agent/ANALYTICS_SERVER_TOKEN value | ANALYTICS_SERVER_TOKEN ;
            secret/data/off-chain-agent/MILVUS_URL value | MILVUS_URL ;
            secret/data/off-chain-agent/REPLICATE_WEBHOOK_SIGNING_SECRET value | REPLICATE_WEBHOOK_SIGNING_SECRET ;
            secret/data/off-chain-agent/SENTRY_CLIENT_SECRET_1 value | SENTRY_CLIENT_SECRET_1 ;
            secret/data/off-chain-agent/SENTRY_CLIENT_SECRET_2 value | SENTRY_CLIENT_SECRET_2 ;
            secret/data/off-chain-agent/GCHAT_SENTRY_WEBHOOK_URL value | GCHAT_SENTRY_WEBHOOK_URL ;
            secret/data/off-chain-agent/GOOGLE_CHAT_REPORT_SPACE_URL value | GOOGLE_CHAT_REPORT_SPACE_URL ;
            secret/data/off-chain-agent/KVROCKS_PASSWORD value | KVROCKS_PASSWORD ;
            secret/data/off-chain-agent/KVROCKS_HOSTS value | KVROCKS_HOSTS ;
            secret/data/off-chain-agent/KVROCKS_CA_CERT value | KVROCKS_CA_CERT ;
            secret/data/off-chain-agent/KVROCKS_CLIENT_CERT value | KVROCKS_CLIENT_CERT ;
            secret/data/off-chain-agent/KVROCKS_CLIENT_KEY value | KVROCKS_CLIENT_KEY ;
            secret/data/off-chain-agent/SCRATCHPAD_DRAGONFLY_HOST value | SCRATCHPAD_DRAGONFLY_HOST ;
            secret/data/off-chain-agent/SCRATCHPAD_DRAGONFLY_PORT value | SCRATCHPAD_DRAGONFLY_PORT ;
            secret/data/off-chain-agent/SCRATCHPAD_DRAGONFLY_PASSWORD value | SCRATCHPAD_DRAGONFLY_PASSWORD ;
            secret/data/off-chain-agent/YRAL_MOBILE_SERVICE_ACCOUNT_KEY value | YRAL_MOBILE_SERVICE_ACCOUNT_KEY ;
            secret/data/off-chain-agent/PROMPT_MODERATION_GEMINI_API_KEY value | PROMPT_MODERATION_GEMINI_API_KEY ;
            secret/data/DRAGONFLY_CLUSTER_1_PASSWORD value | DRAGONFLY_PASSWORD ;
            secret/data/DRAGONFLY_CLUSTER_1_HOSTS value | DRAGONFLY_HOSTS ;
            secret/data/DRAGONFLY_CLUSTER_1_CA_CERT value | DRAGONFLY_CA_CERT ;
            secret/data/DRAGONFLY_CLUSTER_1_CLIENT_CERT value | DRAGONFLY_CLIENT_CERT ;
            secret/data/DRAGONFLY_CLUSTER_1_CLIENT_KEY value | DRAGONFLY_CLIENT_KEY ;
            secret/data/DRAGONFLY_CLUSTER_2_PASSWORD value | DRAGONFLY_2_PASSWORD ;
            secret/data/DRAGONFLY_CLUSTER_2_HOSTS value | DRAGONFLY_2_HOSTS ;
            secret/data/DRAGONFLY_CLUSTER_2_CA_CERT value | DRAGONFLY_2_CA_CERT ;
            secret/data/DRAGONFLY_CLUSTER_2_CLIENT_CERT value | DRAGONFLY_2_CLIENT_CERT ;
            secret/data/DRAGONFLY_CLUSTER_2_CLIENT_KEY value | DRAGONFLY_2_CLIENT_KEY ;
            

      - name: Sync deployment files to server
        run: |
          rsync -avz --delete \
            ./deploy-baremetal/ \
            root@${{ matrix.server }}:/home/offchain-agent/

      - name: Log in to GHCR on server
        run: |
          ssh root@${{ matrix.server }} "
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          "

      - name: Deploy with Docker Compose
        env:
          CF_R2_ACCESS_KEY_TEMP: ${{ env.CF_R2_ACCESS_KEY_TEMP }}
          CF_R2_SECRET_ACCESS_KEY_TEMP: ${{ env.CF_R2_SECRET_ACCESS_KEY_TEMP }}
          CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY: ${{ env.CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY }}
          BACKEND_ADMIN_IDENTITY: ${{ env.BACKEND_ADMIN_IDENTITY }}
          GOOGLE_SA_KEY: ${{ env.GOOGLE_SA_KEY }}
          GRPC_AUTH_TOKEN: ${{ env.GRPC_AUTH_TOKEN }}
          YRAL_CLOUDFLARE_WORKER_GRPC_AUTH_TOKEN: ${{ env.YRAL_CLOUDFLARE_WORKER_GRPC_AUTH_TOKEN }}
          YRAL_METADATA_TOKEN: ${{ env.YRAL_METADATA_TOKEN }}
          UPSTASH_VECTOR_READ_WRITE_TOKEN: ${{ env.UPSTASH_VECTOR_READ_WRITE_TOKEN }}
          ML_SERVER_JWT_TOKEN: ${{ env.ML_SERVER_JWT_TOKEN }}
          CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN: ${{ env.CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ env.QSTASH_CURRENT_SIGNING_KEY }}
          CF_IMAGES_API_TOKEN: ${{ env.CF_IMAGES_API_TOKEN }}
          NSFW_GRPC_TOKEN: ${{ env.NSFW_GRPC_TOKEN }}
          QSTASH_AUTH_TOKEN: ${{ env.QSTASH_AUTH_TOKEN }}
          STORJ_INTERFACE_TOKEN: ${{ env.STORJ_INTERFACE_TOKEN }}
          VIDEOHASH_BACKFILL_TOKEN: ${{ env.VIDEOHASH_BACKFILL_TOKEN }}
          STORJ_BACKUP_CANISTER_ACCESS_GRANT: ${{ env.STORJ_BACKUP_CANISTER_ACCESS_GRANT }}
          CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL: ${{ env.CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL }}
          ALLOYDB_SERVICE_ACCOUNT_JSON: ${{ env.ALLOYDB_SERVICE_ACCOUNT_JSON }}
          ALLOYDB_INSTANCE: ${{ env.ALLOYDB_INSTANCE }}
          ALLOYDB_DB_PASSWORD: ${{ env.ALLOYDB_DB_PASSWORD }}
          CANISTER_BACKUP_CACHE_REDIS_URL: ${{ env.CANISTER_BACKUP_CACHE_REDIS_URL }}
          YRAL_METADATA_NOTIFICATION_API_KEY: ${{ env.YRAL_METADATA_NOTIFICATION_API_KEY }}
          ML_FEED_CACHE_MEMORYSTORE_URL: ${{ env.ML_FEED_CACHE_MEMORYSTORE_URL }}
          LUMALABS_API_KEY: ${{ env.LUMALABS_API_KEY }}
          YRAL_HON_WORKER_JWT: ${{ env.YRAL_HON_WORKER_JWT }}
          LEADERBOARD_REDIS_URL: ${{ env.LEADERBOARD_REDIS_URL }}
          SERVICE_CANISTER_MIGRATION_REDIS_URL: ${{ env.SERVICE_CANISTER_MIGRATION_REDIS_URL }}
          HETZNER_S3_ACCESS_KEY: ${{ env.HETZNER_S3_ACCESS_KEY }}
          HETZNER_S3_SECRET_KEY: ${{ env.HETZNER_S3_SECRET_KEY }}
          AI_VIDEO_DETECTOR_API_KEY: ${{ env.AI_VIDEO_DETECTOR_API_KEY }}
          REPLICATE_API_TOKEN: ${{ env.REPLICATE_API_TOKEN }}
          COMFYUI_API_URL: ${{ env.COMFYUI_API_URL }}
          COMFYUI_VIEW_URL: ${{ env.COMFYUI_VIEW_URL }}
          COMFYUI_API_TOKEN: ${{ env.COMFYUI_API_TOKEN }}
          BTC_REWARDS_GCHAT_WEBHOOK_URL: ${{ env.BTC_REWARDS_GCHAT_WEBHOOK_URL }}
          YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY: ${{ env.YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY }}
          ANALYTICS_SERVER_TOKEN: ${{ env.ANALYTICS_SERVER_TOKEN }}
          MILVUS_URL: ${{ env.MILVUS_URL }}
          REPLICATE_WEBHOOK_SIGNING_SECRET: ${{ env.REPLICATE_WEBHOOK_SIGNING_SECRET }}
          SENTRY_CLIENT_SECRET_1: ${{ env.SENTRY_CLIENT_SECRET_1 }}
          SENTRY_CLIENT_SECRET_2: ${{ env.SENTRY_CLIENT_SECRET_2 }}
          GCHAT_SENTRY_WEBHOOK_URL: ${{ env.GCHAT_SENTRY_WEBHOOK_URL }}
          GOOGLE_CHAT_REPORT_SPACE_URL: ${{ env.GOOGLE_CHAT_REPORT_SPACE_URL }}
          KVROCKS_PASSWORD: ${{ env.KVROCKS_PASSWORD }}
          KVROCKS_HOSTS: ${{ env.KVROCKS_HOSTS }}
          KVROCKS_CA_CERT: ${{ env.KVROCKS_CA_CERT }}
          KVROCKS_CLIENT_CERT: ${{ env.KVROCKS_CLIENT_CERT }}
          KVROCKS_CLIENT_KEY: ${{ env.KVROCKS_CLIENT_KEY }}
          SCRATCHPAD_DRAGONFLY_HOST: ${{ env.SCRATCHPAD_DRAGONFLY_HOST }}
          SCRATCHPAD_DRAGONFLY_PORT: ${{ env.SCRATCHPAD_DRAGONFLY_PORT }}
          SCRATCHPAD_DRAGONFLY_PASSWORD: ${{ env.SCRATCHPAD_DRAGONFLY_PASSWORD }}
          DRAGONFLY_PASSWORD: ${{ env.DRAGONFLY_PASSWORD }}
          DRAGONFLY_HOSTS: ${{ env.DRAGONFLY_HOSTS }}
          DRAGONFLY_CA_CERT: ${{ env.DRAGONFLY_CA_CERT }}
          DRAGONFLY_CLIENT_CERT: ${{ env.DRAGONFLY_CLIENT_CERT }}
          DRAGONFLY_CLIENT_KEY: ${{ env.DRAGONFLY_CLIENT_KEY }}
          DRAGONFLY_2_PASSWORD: ${{ env.DRAGONFLY_2_PASSWORD }}
          DRAGONFLY_2_HOSTS: ${{ env.DRAGONFLY_2_HOSTS }}
          DRAGONFLY_2_CA_CERT: ${{ env.DRAGONFLY_2_CA_CERT }}
          DRAGONFLY_2_CLIENT_CERT: ${{ env.DRAGONFLY_2_CLIENT_CERT }}
          DRAGONFLY_2_CLIENT_KEY: ${{ env.DRAGONFLY_2_CLIENT_KEY }}
          YRAL_MOBILE_SERVICE_ACCOUNT_KEY: ${{ env.YRAL_MOBILE_SERVICE_ACCOUNT_KEY }}
          PROMPT_MODERATION_GEMINI_API_KEY: ${{ env.PROMPT_MODERATION_GEMINI_API_KEY }}
        run: |
          # Shell-escape JSON secrets
          GOOGLE_SA_KEY_ESCAPED=$(printf '%q' "$GOOGLE_SA_KEY")
          ALLOYDB_SA_JSON_ESCAPED=$(printf '%q' "$ALLOYDB_SERVICE_ACCOUNT_JSON")
          YRAL_MOBILE_SA_KEY_ESCAPED=$(printf '%q' "$YRAL_MOBILE_SERVICE_ACCOUNT_KEY")

          ssh root@${{ matrix.server }} "
            cd /home/offchain-agent

            echo 'Pulling latest images...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            PROXY_IMAGE=ghcr.io/${{ github.repository_owner }}/fly-redis-proxy-offchain \
            IMAGE_TAG=${{ github.sha }} \
            docker compose pull

            echo 'Stopping existing containers...'
            docker compose down --remove-orphans || true

            echo 'Starting services...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            PROXY_IMAGE=ghcr.io/${{ github.repository_owner }}/fly-redis-proxy-offchain \
            IMAGE_TAG=${{ github.sha }} \
            FLY_API_TOKEN='${{ secrets.OFFCHAIN_FLY_API_TOKEN }}' \
            FLY_REDIS_ML_FEED_PASSWORD='${{ needs.fetch-redis-passwords.outputs.ml_feed_password }}' \
            CF_R2_ACCESS_KEY_TEMP='${CF_R2_ACCESS_KEY_TEMP}' \
            CF_R2_SECRET_ACCESS_KEY_TEMP='${CF_R2_SECRET_ACCESS_KEY_TEMP}' \
            CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY='${CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY}' \
            BACKEND_ADMIN_IDENTITY='${BACKEND_ADMIN_IDENTITY}' \
            GOOGLE_SA_KEY=$GOOGLE_SA_KEY_ESCAPED \
            ALLOYDB_SERVICE_ACCOUNT_JSON=$ALLOYDB_SA_JSON_ESCAPED \
            YRAL_CLOUDFLARE_WORKER_GRPC_AUTH_TOKEN='${YRAL_CLOUDFLARE_WORKER_GRPC_AUTH_TOKEN}' \
            GRPC_AUTH_TOKEN='${GRPC_AUTH_TOKEN}' \
            YRAL_METADATA_TOKEN='${YRAL_METADATA_TOKEN}' \
            UPSTASH_VECTOR_READ_WRITE_TOKEN='${UPSTASH_VECTOR_READ_WRITE_TOKEN}' \
            ML_SERVER_JWT_TOKEN='${ML_SERVER_JWT_TOKEN}' \
            CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN='${CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN}' \
            QSTASH_CURRENT_SIGNING_KEY='${QSTASH_CURRENT_SIGNING_KEY}' \
            CF_IMAGES_API_TOKEN='${CF_IMAGES_API_TOKEN}' \
            NSFW_GRPC_TOKEN='${NSFW_GRPC_TOKEN}' \
            QSTASH_AUTH_TOKEN='${QSTASH_AUTH_TOKEN}' \
            STORJ_INTERFACE_TOKEN='${STORJ_INTERFACE_TOKEN}' \
            VIDEOHASH_BACKFILL_TOKEN='${VIDEOHASH_BACKFILL_TOKEN}' \
            STORJ_BACKUP_CANISTER_ACCESS_GRANT='${STORJ_BACKUP_CANISTER_ACCESS_GRANT}' \
            CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL='${CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL}' \
            ALLOYDB_INSTANCE='${ALLOYDB_INSTANCE}' \
            ALLOYDB_DB_PASSWORD='${ALLOYDB_DB_PASSWORD}' \
            CANISTER_BACKUP_CACHE_REDIS_URL='${CANISTER_BACKUP_CACHE_REDIS_URL}' \
            YRAL_METADATA_NOTIFICATION_API_KEY='${YRAL_METADATA_NOTIFICATION_API_KEY}' \
            ML_FEED_CACHE_MEMORYSTORE_URL='${ML_FEED_CACHE_MEMORYSTORE_URL}' \
            LUMALABS_API_KEY='${LUMALABS_API_KEY}' \
            YRAL_HON_WORKER_JWT='${YRAL_HON_WORKER_JWT}' \
            LEADERBOARD_REDIS_URL='${LEADERBOARD_REDIS_URL}' \
            HETZNER_S3_ACCESS_KEY='${HETZNER_S3_ACCESS_KEY}' \
            HETZNER_S3_SECRET_KEY='${HETZNER_S3_SECRET_KEY}' \
            REPLICATE_API_TOKEN='${REPLICATE_API_TOKEN}' \
            AI_VIDEO_DETECTOR_API_KEY='${AI_VIDEO_DETECTOR_API_KEY}' \
            PROMPT_MODERATION_GEMINI_API_KEY='${PROMPT_MODERATION_GEMINI_API_KEY}' \
            COMFYUI_API_URL='${COMFYUI_API_URL}' \
            COMFYUI_VIEW_URL='${COMFYUI_VIEW_URL}' \
            COMFYUI_API_TOKEN='${COMFYUI_API_TOKEN}' \
            BTC_REWARDS_GCHAT_WEBHOOK_URL='${BTC_REWARDS_GCHAT_WEBHOOK_URL}' \
            YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY='${YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY}' \
