            KVROCKS_PASSWORD='${KVROCKS_PASSWORD}' \
            KVROCKS_HOSTS='${KVROCKS_HOSTS}' \
            KVROCKS_CA_CERT='${KVROCKS_CA_CERT}' \
            KVROCKS_CLIENT_CERT='${KVROCKS_CLIENT_CERT}' \
            KVROCKS_CLIENT_KEY='${KVROCKS_CLIENT_KEY}' \
            SCRATCHPAD_DRAGONFLY_HOST='${SCRATCHPAD_DRAGONFLY_HOST}' \
            SCRATCHPAD_DRAGONFLY_PORT='${SCRATCHPAD_DRAGONFLY_PORT}' \
            SCRATCHPAD_DRAGONFLY_PASSWORD='${SCRATCHPAD_DRAGONFLY_PASSWORD}' \
            DRAGONFLY_PASSWORD='${DRAGONFLY_PASSWORD}' \
            DRAGONFLY_HOSTS='${DRAGONFLY_HOSTS}' \
            DRAGONFLY_CA_CERT='${DRAGONFLY_CA_CERT}' \
            DRAGONFLY_CLIENT_CERT='${DRAGONFLY_CLIENT_CERT}' \
            DRAGONFLY_CLIENT_KEY='${DRAGONFLY_CLIENT_KEY}' \
            DRAGONFLY_2_PASSWORD='${DRAGONFLY_2_PASSWORD}' \
            DRAGONFLY_2_HOSTS='${DRAGONFLY_2_HOSTS}' \
