name: deploy preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write
  deployments: write
  packages: write

jobs:
  build_check:
    uses: ./.github/workflows/build-check.yml
    with:
      publish-artifact: true
    secrets: inherit

  preview:
    if: ${{ github.event.pull_request.state == 'open' }}
    needs: build_check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    concurrency:
      group: pr-${{ github.event.number }}-${{ github.event.repository.name }}
      cancel-in-progress: true

    environment:
      name: pr-${{ github.event.number }}
      url: ${{ steps.meta.outputs.preview_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute Preview Metadata
        id: meta
        run: |
          PR_NUMBER=${{ github.event.number }}
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
          IMAGE="ghcr.io/${{ github.repository_owner }}/${REPO_NAME}"
          IMAGE_TAG="pr-${PR_NUMBER}"
          PREVIEW_DOMAIN="pr-${PR_NUMBER}-${REPO_NAME}.preview.yral.com"
          PREVIEW_URL="https://${PREVIEW_DOMAIN}"
          APP_NAME="pr-${PR_NUMBER}-${REPO_NAME}"

          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "preview_domain=${PREVIEW_DOMAIN}" >> $GITHUB_OUTPUT
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "app_name=${APP_NAME}" >> $GITHUB_OUTPUT

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-glibc

      - name: Fix Binary Permissions
        run: chmod +x target/x86_64-unknown-linux-gnu/release/icp-off-chain-agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_tag }}

      - name: Create or Get Coolify Application for PR
        id: coolify_app
        run: |
          APP_NAME="${{ steps.meta.outputs.app_name }}"
          IMAGE="${{ steps.meta.outputs.image }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          PREVIEW_DOMAIN="${{ steps.meta.outputs.preview_domain }}"

          # Check if app already exists for this PR (e.g. new commit pushed to same PR)
          EXISTING=$(curl -s \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            | jq -r --arg name "$APP_NAME" '.[] | select(.name == $name) | .uuid // empty')

          if [ -n "$EXISTING" ]; then
            echo "Reusing existing Coolify app: $EXISTING"
            echo "app_uuid=${EXISTING}" >> $GITHUB_OUTPUT
          else
            echo "Creating new Coolify app: $APP_NAME"

            RESPONSE=$(curl -s -X POST \
              "${{ secrets.COOLIFY_URL }}/api/v1/applications/dockerimage" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"${APP_NAME}\",
                \"project_uuid\": \"${{ secrets.COOLIFY_PROJECT_UUID }}\",
                \"server_uuid\": \"${{ secrets.COOLIFY_SERVER_UUID }}\",
                \"environment_name\": \"preview\",
                \"environment_uuid\": \"${{ secrets.COOLIFY_ENV_UUID }}\",
                \"docker_registry_image_name\": \"${IMAGE}\",
                \"docker_registry_image_tag\": \"${IMAGE_TAG}\",
                \"domains\": \"https://${PREVIEW_DOMAIN}\",
                \"ports_exposes\": \"8080\",
                \"is_static\": false
              }")

            echo "Create response: $RESPONSE"

            APP_UUID=$(echo $RESPONSE | jq -r '.uuid // empty')

            if [ -z "$APP_UUID" ]; then
              echo "Failed to create Coolify application"
              echo "$RESPONSE"
              exit 1
            fi

            echo "app_uuid=${APP_UUID}" >> $GITHUB_OUTPUT
          fi

      - name: Push Environment Variables to Coolify
        env:
          # Mapping all your Fly secrets here
          APP_URL: ${{ steps.meta.outputs.preview_url }}
          OFF_CHAIN_AGENT_URL: https://${{ steps.meta.outputs.preview_domain }}/
          CF_R2_ACCESS_KEY_TEMP: ${{ secrets.HOT_OR_NOT_OFF_CHAIN_AGENT_CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY_TEMP: ${{ secrets.HOT_OR_NOT_OFF_CHAIN_AGENT_CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY: ${{ secrets.CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY }}
          BACKEND_ADMIN_IDENTITY: ${{ secrets.YRAL_DAPP_BACKEND_APP_ADMIN_AND_PROPOSAL_SUBMITTER_IDENTITY_PRIVATE_KEY }}
          GOOGLE_SA_KEY: ${{ secrets.YRAL_OFF_CHAIN_AGENT_GOOGLE_CLOUD_SERVICE_ACCOUNT_JSON_KEY }}
          GRPC_AUTH_TOKEN: ${{ secrets.OFF_CHAIN_AGENT_GRPC_AUTH_TOKEN }}
          YRAL_CLOUDFLARE_WORKER_GRPC_AUTH_TOKEN: ${{ secrets.YRAL_CLOUDFLARE_WORKERS_TO_OFFCHAIN_AGENT_GRPC_AUTH_TOKEN }}
          YRAL_METADATA_TOKEN: ${{ secrets.YRAL_AUTH_METADATA_SERVICE_ACCESS_JWT_TOKEN_FOR_OFFCHAIN_AGENT }}
          UPSTASH_VECTOR_READ_WRITE_TOKEN: ${{ secrets.UPSTASH_VECTOR_READ_WRITE_TOKEN }}
          ML_SERVER_JWT_TOKEN: ${{ secrets.ML_SERVER_JWT_TOKEN }}
          CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN: ${{ secrets.CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          CF_IMAGES_API_TOKEN: ${{ secrets.CLOUDFLARE_IMAGES_READ_AND_WRITE_API_TOKEN }}
          NSFW_GRPC_TOKEN: ${{ secrets.TOKEN_TO_SIGN_OUTGOING_CALLS_TO_NSFW_DETECT_SERVICE }}
          QSTASH_AUTH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          ML_FEED_CACHE_REDIS_URL: ${{ secrets.YRAL_ML_FEED_CACHE_REDIS_URL }}
          STORJ_INTERFACE_TOKEN: ${{ secrets.STORJ_INTERFACE_TOKEN }}
          VIDEOHASH_BACKFILL_TOKEN: ${{ secrets.VIDEOHASH_BACKFILL_TOKEN }}
          STORJ_BACKUP_CANISTER_ACCESS_GRANT: ${{ secrets.STORJ_BACKUP_CANISTER_ACCESS_GRANT }}
          CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL }}
          ALLOYDB_SERVICE_ACCOUNT_JSON: ${{ secrets.ALLOYDB_SERVICE_ACCOUNT_JSON_PROD }}
          ALLOYDB_INSTANCE: ${{ secrets.ALLOYDB_INSTANCE_PROD }}
          ALLOYDB_DB_PASSWORD: ${{ secrets.ALLOYDB_DB_PASSWORD_PROD }}
          CANISTER_BACKUP_CACHE_REDIS_URL: ${{ secrets.CANISTER_BACKUP_CACHE_REDIS_URL }}
          YRAL_METADATA_NOTIFICATION_API_KEY: ${{ secrets.YRAL_METADATA_NOTIFICATION_API_KEY }}
          ML_FEED_CACHE_MEMORYSTORE_URL: ${{ secrets.ML_FEED_CACHE_MEMORYSTORE_URL }}
          LUMALABS_API_KEY: ${{ secrets.VIDEOGEN_PROVIDER_LUMALABS_API_KEY }}
          YRAL_HON_WORKER_JWT: ${{ secrets.YRAL_HON_WORKER_JWT }}
          LEADERBOARD_REDIS_URL: ${{ secrets.LEADERBOARD_REDIS_URL }}
          SERVICE_CANISTER_MIGRATION_REDIS_URL: ${{ secrets.SERVICE_CANISTER_MIGRATION_REDIS_URL }}
          TEST_REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
          HETZNER_S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          HETZNER_S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          COMFYUI_API_URL: ${{ vars.COMFYUI_API_URL }}
          COMFYUI_VIEW_URL: ${{ vars.COMFYUI_VIEW_URL }}
          COMFYUI_API_TOKEN: ${{ secrets.COMFYUI_API_TOKEN }}
          BTC_REWARDS_GCHAT_WEBHOOK_URL: ${{ secrets.BTC_REWARDS_GCHAT_WEBHOOK_URL }}
          YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY: ${{ secrets.YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY }}
          ANALYTICS_SERVER_TOKEN: ${{ secrets.ANALYTICS_SERVER_TOKEN }}
          MILVUS_URL: ${{ secrets.MILVUS_URL }}
          REPLICATE_WEBHOOK_SIGNING_SECRET: ${{ secrets.REPLICATE_WEBHOOK_SIGNING_SECRET }}
          SENTRY_CLIENT_SECRET_1: ${{ secrets.SENTRY_CLIENT_SECRET_1 }}
          SENTRY_CLIENT_SECRET_2: ${{ secrets.SENTRY_CLIENT_SECRET_2 }}
          GCHAT_SENTRY_WEBHOOK_URL: ${{ secrets.GCHAT_SENTRY_WEBHOOK_URL }}
          GOOGLE_CHAT_REPORT_SPACE_URL: ${{ secrets.GOOGLE_CHAT_REPORT_SPACE_URL }}
          KVROCKS_PASSWORD: ${{ secrets.KVROCKS_PASSWORD }}
          KVROCKS_HOSTS: ${{ vars.KVROCKS_HOSTS }}
          KVROCKS_CA_CERT: ${{ secrets.KVROCKS_CA_CERT }}
          KVROCKS_CLIENT_CERT: ${{ secrets.KVROCKS_CLIENT_CERT }}
          KVROCKS_CLIENT_KEY: ${{ secrets.KVROCKS_CLIENT_KEY }}
          SCRATCHPAD_DRAGONFLY_HOST: ${{ vars.SCRATCHPAD_DRAGONFLY_HOST }}
          SCRATCHPAD_DRAGONFLY_PORT: ${{ vars.SCRATCHPAD_DRAGONFLY_PORT }}
          SCRATCHPAD_DRAGONFLY_PASSWORD: ${{ secrets.SCRATCHPAD_DRAGONFLY_PASSWORD }}
          DRAGONFLY_PASSWORD: ${{ secrets.DRAGONFLY_PASSWORD }}
          DRAGONFLY_HOSTS: ${{ vars.DRAGONFLY_HOSTS }}
          DRAGONFLY_CA_CERT: ${{ secrets.DRAGONFLY_CA_CERT }}
          DRAGONFLY_CLIENT_CERT: ${{ secrets.DRAGONFLY_CLIENT_CERT }}
          DRAGONFLY_CLIENT_KEY: ${{ secrets.DRAGONFLY_CLIENT_KEY }}
          DRAGONFLY_2_PASSWORD: ${{ secrets.DRAGONFLY_2_PASSWORD }}
          DRAGONFLY_2_HOSTS: ${{ vars.DRAGONFLY_2_HOSTS }}
          DRAGONFLY_2_CA_CERT: ${{ secrets.DRAGONFLY_2_CA_CERT }}
          DRAGONFLY_2_CLIENT_CERT: ${{ secrets.DRAGONFLY_2_CLIENT_CERT }}
          DRAGONFLY_2_CLIENT_KEY: ${{ secrets.DRAGONFLY_2_CLIENT_KEY }}
          YRAL_MOBILE_SERVICE_ACCOUNT_KEY: ${{ secrets.YRAL_MOBILE_SERVICE_ACCOUNT_KEY }}
          PROMPT_MODERATION_GEMINI_API_KEY: ${{ secrets.PROMPT_MODERATION_GEMINI_API_KEY }}
          SENTRY_ENVIRONMENT: "staging"
          ALLOYDB_DB_NAME: "postgres"
          ALLOYDB_DB_USER: "postgres"
        run: |
          APP_UUID="${{ steps.coolify_app.outputs.app_uuid }}"
          flatten() { echo "$1" | tr -d '\n\r'; }
          
          ENV_JSON=$(jq -n \
            --arg app_url "$APP_URL" \
            --arg sentry_environment "$SENTRY_ENVIRONMENT" \
            --arg alloydb_db_name "$ALLOYDB_DB_NAME" \
            --arg alloydb_db_user "$ALLOYDB_DB_USER" \
            --arg off_chain_agent_url "$OFF_CHAIN_AGENT_URL" \
            --arg cf_r2_access_key_temp "$CF_R2_ACCESS_KEY_TEMP" \
            --arg cf_r2_secret_access_key_temp "$CF_R2_SECRET_ACCESS_KEY_TEMP" \
            --arg cf_worker_access_off_chain_agent_key "$CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY" \
            --arg backend_admin_identity "$BACKEND_ADMIN_IDENTITY" \
            --arg google_sa_key "$(flatten "$GOOGLE_SA_KEY")" \
            --arg grpc_auth_token "$GRPC_AUTH_TOKEN" \
            --arg yral_cloudflare_worker_grpc_auth_token "$YRAL_CLOUDFLARE_WORKER_GRPC_AUTH_TOKEN" \
            --arg yral_metadata_token "$YRAL_METADATA_TOKEN" \
            --arg upstash_vector_read_write_token "$UPSTASH_VECTOR_READ_WRITE_TOKEN" \
            --arg ml_server_jwt_token "$ML_SERVER_JWT_TOKEN" \
            --arg cloudflare_stream_read_and_list_access_token "$CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN" \
            --arg qstash_current_signing_key "$QSTASH_CURRENT_SIGNING_KEY" \
            --arg cf_images_api_token "$CF_IMAGES_API_TOKEN" \
            --arg nsfw_grpc_token "$NSFW_GRPC_TOKEN" \
            --arg qstash_auth_token "$QSTASH_AUTH_TOKEN" \
            --arg ml_feed_cache_redis_url "$ML_FEED_CACHE_REDIS_URL" \
            --arg storj_interface_token "$STORJ_INTERFACE_TOKEN" \
            --arg videohash_backfill_token "$VIDEOHASH_BACKFILL_TOKEN" \
            --arg storj_backup_canister_access_grant "$STORJ_BACKUP_CANISTER_ACCESS_GRANT" \
            --arg canister_backup_alert_google_chat_webhook_url "$CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL" \
            --arg alloydb_service_account_json "$(flatten "$ALLOYDB_SERVICE_ACCOUNT_JSON")" \
            --arg alloydb_instance "$ALLOYDB_INSTANCE" \
            --arg alloydb_db_password "$ALLOYDB_DB_PASSWORD" \
            --arg canister_backup_cache_redis_url "$CANISTER_BACKUP_CACHE_REDIS_URL" \
            --arg yral_metadata_notification_api_key "$YRAL_METADATA_NOTIFICATION_API_KEY" \
            --arg ml_feed_cache_memorystore_url "$ML_FEED_CACHE_MEMORYSTORE_URL" \
            --arg lumalabs_api_key "$LUMALABS_API_KEY" \
            --arg yral_hon_worker_jwt "$YRAL_HON_WORKER_JWT" \
            --arg leaderboard_redis_url "$LEADERBOARD_REDIS_URL" \
            --arg service_canister_migration_redis_url "$SERVICE_CANISTER_MIGRATION_REDIS_URL" \
            --arg test_redis_url "$TEST_REDIS_URL" \
            --arg hetzner_s3_access_key "$HETZNER_S3_ACCESS_KEY" \
            --arg hetzner_s3_secret_key "$HETZNER_S3_SECRET_KEY" \
            --arg replicate_api_token "$REPLICATE_API_TOKEN" \
            --arg comfyui_api_url "$COMFYUI_API_URL" \
