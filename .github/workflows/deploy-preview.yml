              { "key": "ML_SERVER_JWT_TOKEN", "value": $ml_server_jwt_token, "is_literal": true},
              { "key": "CLOUDFLARE_STREAM_READ_AND_LIST_ACCESS_TOKEN", "value": $cloudflare_stream_read_and_list_access_token, "is_literal": true},
              { "key": "QSTASH_CURRENT_SIGNING_KEY", "value": $qstash_current_signing_key, "is_multiline": true},
              { "key": "CF_IMAGES_API_TOKEN", "value": $cf_images_api_token, "is_literal": true},
              { "key": "NSFW_GRPC_TOKEN", "value": $nsfw_grpc_token, "is_literal": true},
              { "key": "QSTASH_AUTH_TOKEN", "value": $qstash_auth_token, "is_literal": true},
              { "key": "ML_FEED_CACHE_REDIS_URL", "value": $ml_feed_cache_redis_url,  "is_literal": true},
              { "key": "STORJ_INTERFACE_TOKEN", 	"value": $storj_interface_token, 	"is_literal": true},
              {	"key": "VIDEOHASH_BACKFILL_TOKEN", "value": $videohash_backfill_token, "is_literal": true},
              { "key": "STORJ_BACKUP_CANISTER_ACCESS_GRANT", "value": $storj_backup_canister_access_grant, "is_literal": true},
              { "key": "CANISTER_BACKUP_ALERT_GOOGLE_CHAT_WEBHOOK_URL", "value": $canister_backup_alert_google_chat_webhook_url, "is_literal": true},
              { "key": "ALLOYDB_SERVICE_ACCOUNT_JSON", "value": $alloydb_service_account_json, "is_literal": true},
              { "key": "ALLOYDB_INSTANCE", "value": $alloydb_instance, "is_literal":true},
              { "key": "ALLOYDB_DB_PASSWORD", "value": $alloydb_db_password, "is_literal":true},
              { "key": "CANISTER_BACKUP_CACHE_REDIS_URL", "value": $canister_backup_cache_redis_url, "is_literal": true},
              { "key": "YRAL_METADATA_NOTIFICATION_API_KEY", "value": $yral_metadata_notification_api_key, "is_literal": true},
              { "key": "ML_FEED_CACHE_MEMORYSTORE_URL", "value": $ml_feed_cache_memorystore_url, "is_literal": true},
