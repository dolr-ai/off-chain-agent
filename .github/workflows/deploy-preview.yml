              { "key": "TEST_REDIS_URL", "value":$test_redis_url, "is_literal":true},
              { "key": "HETZNER_S3_ACCESS_KEY", "value": $hetzner_s3_access_key, "is_literal": true},
              { "key": "HETZNER_S3_SECRET_KEY", "value": $hetzner_s3_secret_key, "is_literal": true},
              { "key": "REPLICATE_API_TOKEN", "value": $replicate_api_token, "is_literal": true},
              { "key": "COMFYUI_API_URL", "value": $comfyui_api_url, "is_literal": true},
              { "key": "COMFYUI_VIEW_URL", "value": $comfyui_view_url, "is_literal": true},
              { "key": "COMFYUI_API_TOKEN", "value": $comfyui_api_token, "is_literal": true},
              { "key": "BTC_REWARDS_GCHAT_WEBHOOK_URL", "value": $btc_rewards_gchat_webhook_url, "is_literal": true},
              { "key": "YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY", "value": $yral_off_chain_user_migration_api_key, "is_literal": true},
              { "key": "ANALYTICS_SERVER_TOKEN", "value": $analytics_server_token, "is_literal": true},
              { "key": "MILVUS_URL", "value": $milvus_url, "is_literal":true},
              { "key": "REPLICATE_WEBHOOK_SIGNING_SECRET", "value": $replicate_webhook_signing_secret, "is_literal": true},
              { "key": "SENTRY_CLIENT_SECRET_1", "value": $sentry_client_secret_1, "is_literal": true},
              { "key": "SENTRY_CLIENT_SECRET_2", "value": $sentry_client_secret_2, "is_literal": true},
              { "key": "GCHAT_SENTRY_WEBHOOK_URL", "value": $gchat_sentry_webhook_url, "is_literal": true},
              { "key": "GOOGLE_CHAT_REPORT_SPACE_URL", "value": $google_chat_report_space_url, "is_literal": true},
              { "key": "KVROCKS_PASSWORD", "value": $kvrocks_password, "is_literal": true},
              { "key": "KVROCKS_HOSTS", "value": $kvrocks_hosts, "is_literal": true},
              { "key": "KVROCKS_CA_CERT", "value": $kvrocks_ca_cert, "is_multiline": true},
              { "key": "KVROCKS_CLIENT_CERT", "value": $kvrocks_client_cert, "is_multiline": true},
              { "key": "KVROCKS_CLIENT_KEY", "value": $kvrocks_client_key, "is_multiline": true},
              { "key": "SCRATCHPAD_DRAGONFLY_HOST", "value": $scratchpad_dragonfly_host, "is_literal": true},
              { "key": "SCRATCHPAD_DRAGONFLY_PORT", "value": $scratchpad_dragonfly_port, "is_literal": true},
              { "key": "SCRATCHPAD_DRAGONFLY_PASSWORD", "value": $scratchpad_dragonfly_password, "is_literal": true},
              { "key": "DRAGONFLY_PASSWORD", "value": $dragonfly_password, "is_literal": true},
              { "key": "DRAGONFLY_HOSTS", "value": $dragonfly_hosts, "is_literal": true},
              { "key": "DRAGONFLY_CA_CERT", "value": $dragonfly_ca_cert, "is_multiline": true},
              { "key": "DRAGONFLY_CLIENT_CERT", "value": $dragonfly_client_cert, "is_multiline": true},
              { "key": "DRAGONFLY_CLIENT_KEY", "value": $dragonfly_client_key, "is_multiline": true},
              { "key": "DRAGONFLY_2_PASSWORD", "value": $dragonfly_2_password, "is_literal": true},
              { "key": "DRAGONFLY_2_HOSTS", "value": $dragonfly_2_hosts, "is_literal":true},
              { "key": "DRAGONFLY_2_CA_CERT", "value": $dragonfly_2_ca_cert, "is_multiline": true},
              { "key": "DRAGONFLY_2_CLIENT_CERT", "value": $dragonfly_2_client_cert, "is_multiline": true},
              { "key": "DRAGONFLY_2_CLIENT_KEY", "value": $dragonfly_2_client_key, "is_multiline": true},
              { "key": "YRAL_MOBILE_SERVICE_ACCOUNT_KEY", "value": $yral_mobile_service_account_key, "is_literal": true},
              { "key": "PROMPT_MODERATION_GEMINI_API_KEY", "value": $prompt_moderation_gemini_api_key,"is_literal": true}
            ]')

          RESPONSE=$(curl -s -o /tmp/curl_response.txt -w "%{http_code}" -X PATCH \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}/envs/bulk" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"data\": ${ENV_JSON}}")

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "Failed to push environment variables (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Start Deployment
        id: deploy
        run: |
          APP_UUID="${{ steps.coolify_app.outputs.app_uuid }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"

          # Ensure the tag is updated if it's a synchronization push
          curl -s -X PATCH \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_registry_image_tag\": \"${IMAGE_TAG}\"}"

          # Trigger deploy
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}/start" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"uuid\": \"${APP_UUID}\",
              \"force\": true
            }")
          
          echo "Deploy response: $RESPONSE"

          DEPLOY_UUID=$(echo $RESPONSE | jq -r '.deployment_uuid // empty')
          if [ -z "$DEPLOY_UUID" ]; then
            echo "Failed to trigger deployment"
            echo "$RESPONSE"
            exit 1
          fi

          echo "deploy_uuid=${DEPLOY_UUID}" >> $GITHUB_OUTPUT
        
      - name: Wait for Deployment
        run: |
          DEPLOY_UUID="${{ steps.deploy.outputs.deploy_uuid }}"
          MAX_WAIT=120
          WAITED=0

          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/${DEPLOY_UUID}" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              | jq -r '.status // empty')

            echo "Status: ${STATUS} (${WAITED}s elapsed)"

            if [ "$STATUS" = "finished" ]; then exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then exit 1
            fi

            sleep 10
            WAITED=$((WAITED + 10))
          done

          echo "Timed out"
          exit 1

  destroy-preview:
    if: ${{ github.event.pull_request.state == 'closed' }}
    runs-on: ubuntu-latest

    steps:
      - name: Compute Metadata
        id: meta
        run: |
          PR_NUMBER=${{ github.event.number }}
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
          APP_NAME="pr-${PR_NUMBER}-${REPO_NAME}"
          echo "app_name=${APP_NAME}"   >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Find and Delete Coolify Application
        run: |
          APP_NAME="${{ steps.meta.outputs.app_name }}"

          APP_UUID=$(curl -s \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            | jq -r --arg name "$APP_NAME" '.[] | select(.name == $name) | .uuid // empty')

          if [ -z "$APP_UUID" ]; then
            echo "No app found for $APP_NAME — skipping"
            exit 0
          fi

          echo "Deleting Coolify app $APP_NAME ($APP_UUID)"

          curl -s -X DELETE \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
