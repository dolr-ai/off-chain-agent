            --arg comfyui_api_token "$COMFYUI_API_TOKEN" \
            --arg btc_rewards_gchat_webhook_url "$BTC_REWARDS_GCHAT_WEBHOOK_URL" \
            --arg yral_off_chain_user_migration_api_key "$YRAL_OFF_CHAIN_USER_MIGRATION_API_KEY" \
            --arg analytics_server_token "$ANALYTICS_SERVER_TOKEN" \
            --arg milvus_url "$MILVUS_URL" \
            --arg replicate_webhook_signing_secret "$REPLICATE_WEBHOOK_SIGNING_SECRET" \
            --arg sentry_client_secret_1 "$SENTRY_CLIENT_SECRET_1" \
            --arg sentry_client_secret_2 "$SENTRY_CLIENT_SECRET_2" \
            --arg gchat_sentry_webhook_url "$GCHAT_SENTRY_WEBHOOK_URL" \
            --arg google_chat_report_space_url "$GOOGLE_CHAT_REPORT_SPACE_URL" \
            --arg kvrocks_password "$KVROCKS_PASSWORD" \
            --arg kvrocks_hosts "$KVROCKS_HOSTS" \
            --arg kvrocks_ca_cert "$KVROCKS_CA_CERT" \
            --arg kvrocks_client_cert "$KVROCKS_CLIENT_CERT" \
            --arg kvrocks_client_key "$KVROCKS_CLIENT_KEY" \
            --arg scratchpad_dragonfly_host "$SCRATCHPAD_DRAGONFLY_HOST" \
            --arg scratchpad_dragonfly_port "$SCRATCHPAD_DRAGONFLY_PORT" \
            --arg scratchpad_dragonfly_password "$SCRATCHPAD_DRAGONFLY_PASSWORD" \
            --arg dragonfly_password "$DRAGONFLY_PASSWORD" \
            --arg dragonfly_hosts "$DRAGONFLY_HOSTS" \
            --arg dragonfly_ca_cert "$DRAGONFLY_CA_CERT" \
            --arg dragonfly_client_cert "$DRAGONFLY_CLIENT_CERT" \
            --arg dragonfly_client_key "$DRAGONFLY_CLIENT_KEY" \
            --arg dragonfly_2_password "$DRAGONFLY_2_PASSWORD" \
            --arg dragonfly_2_hosts "$DRAGONFLY_2_HOSTS" \
            --arg dragonfly_2_ca_cert "$DRAGONFLY_2_CA_CERT" \
            --arg dragonfly_2_client_cert "$DRAGONFLY_2_CLIENT_CERT" \
            --arg dragonfly_2_client_key "$DRAGONFLY_2_CLIENT_KEY" \
            --arg yral_mobile_service_account_key "$(flatten "$YRAL_MOBILE_SERVICE_ACCOUNT_KEY")" \
            --arg prompt_moderation_gemini_api_key "$PROMPT_MODERATION_GEMINI_API_KEY" \
            '[
              { "key": "APP_URL", "value": $app_url,  "is_literal": true},
              { "key": "OFF_CHAIN_AGENT_URL", "value": $off_chain_agent_url, "is_literal": true},
              { "key": "CF_R2_ACCESS_KEY_TEMP", "value": $cf_r2_access_key_temp, "is_literal": true},
              { "key": "CF_R2_SECRET_ACCESS_KEY_TEMP", "value": $cf_r2_secret_access_key_temp, "is_literal": true},
              { "key": "CF_WORKER_ACCESS_OFF_CHAIN_AGENT_KEY", "value": $cf_worker_access_off_chain_agent_key, "is_literal": true},
              { "key": "BACKEND_ADMIN_IDENTITY", "value": $backend_admin_identity, "is_multiline": true},
              { "key": "GOOGLE_SA_KEY", "value": $google_sa_key, "is_literal": true},
